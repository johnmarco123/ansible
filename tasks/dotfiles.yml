- name: Installing stow
  apt: name=stow

- name: Cloning .dotfiles
  ansible.builtin.git:
    repo: 'https://github.com/johnmarco123/.dotfiles.git'
    dest: "{{ lookup('env', 'HOME') }}/.config"
    recursive: yes
    update: yes
    accept_hostkey: yes
    version: master
  become: yes
  become_method: su
  become_user: john
